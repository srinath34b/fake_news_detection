<!DOCTYPE html>
<html>
<head>
    <title>AI Fake News Detector</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #8eddf1;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 70%;
            margin: 50px auto;
            background: rgb(108, 216, 71);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(118, 26, 119, 0.2);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #1722ed;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: #db0a80;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #77bcf5;
            border-radius: 10px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>AI-Based Fake News Detection System</h1>

    <form action="/predict" method="POST">

        <textarea
            name="news"
            placeholder="Paste news article here..."
            required
        >{{ news if news else '' }}</textarea>

        <br>

        <button type="submit">Analyze News</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <h2>Prediction: {{ prediction_text }}</h2>
        <h3>Authenticity Score: {{ score }}%</h3>
    </div>
    {% endif %}

</div>

</body>
</html>
